<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="50" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1100" cy="530" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1000" cy="150" r="30" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Main logo area -->
  <g transform="translate(100, 200)">
    <!-- Large "A" letter -->
    <path d="M150 50 L100 200 L130 200 L140 170 L160 170 L170 200 L200 200 L150 50 Z M145 140 L150 120 L155 140 L145 140 Z" 
          fill="white" stroke="none"/>
    
    <!-- Financial chart elements (scaled up) -->
    <rect x="50" y="250" width="15" height="30" fill="#10b981" rx="3"/>
    <rect x="70" y="230" width="15" height="50" fill="#10b981" rx="3"/>
    <rect x="90" y="210" width="15" height="70" fill="#10b981" rx="3"/>
    <rect x="110" y="190" width="15" height="90" fill="#10b981" rx="3"/>
    <rect x="130" y="170" width="15" height="110" fill="#10b981" rx="3"/>
    <rect x="150" y="150" width="15" height="130" fill="#10b981" rx="3"/>
    <rect x="170" y="130" width="15" height="150" fill="#10b981" rx="3"/>
    <rect x="190" y="110" width="15" height="170" fill="#10b981" rx="3"/>
    
    <!-- Calculator/Financial symbols -->
    <rect x="20" y="20" width="40" height="30" fill="rgba(255,255,255,0.3)" rx="5"/>
    <rect x="240" y="20" width="40" height="30" fill="rgba(255,255,255,0.3)" rx="5"/>
  </g>
  
  <!-- Title -->
  <text x="400" y="200" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="72" font-weight="700" fill="url(#textGradient)">
    ASSFAC
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="280" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="36" font-weight="400" fill="rgba(255,255,255,0.9)">
    Assessoria Financeira Contábil
  </text>
  
  <!-- Description -->
  <text x="400" y="350" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="24" font-weight="300" fill="rgba(255,255,255,0.8)">
    Sistema Financeiro Integrado
  </text>
  
  <!-- Features -->
  <g transform="translate(400, 400)">
    <text x="0" y="0" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
          font-size="20" font-weight="400" fill="rgba(255,255,255,0.9)">
      • Controle de Caixa
    </text>
    <text x="0" y="35" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
          font-size="20" font-weight="400" fill="rgba(255,255,255,0.9)">
      • Gestão Financeira
    </text>
    <text x="0" y="70" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" 
          font-size="20" font-weight="400" fill="rgba(255,255,255,0.9)">
      • Relatórios Automáticos
    </text>
  </g>
  
  <!-- Bottom accent -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(255,255,255,0.1)"/>
</svg>
